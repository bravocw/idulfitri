<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selamat Idulfitri 😆</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #d4fc79, #96e6a1);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .card {
      border-radius: 20px;
    }
    .qris-img {
      max-width: 200px;
      border-radius: 10px;
      display: block;
      margin: 0 auto; /* bikin center */
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card shadow p-4">
      <h1 class="mb-3">🌙 Selamat Idulfitri 🌙</h1>
      <h5 id="ucapan" class="mb-4 text-success"></h5>

      <p class="mb-2">Kalau maaf diterima...</p>
      <h4 class="text-danger">THR juga boleh ya 😜</h4>

      <img src="./qr-code.png" alt="QRIS THR" class="qris-img my-3">

      <p class="text-muted">Scan QRIS di atas biar makin berkah 💸</p>
    </div>
  </div>

  <script>
    const ucapanList = [
      "Pergi ke pasar beli ketupat 🧺\nKalau salah mohon dimaafkan ya sobat 🥺👉👈",
      "Jalan-jalan ke kota Bekasi 🚗\nMaafin aku dong, jangan basi 😭💔",
      "Beli es teh di pinggir jalan 🧋\nMaaf ya kalau aku kebanyakan salah dan kelakuan 🥲",
      "Main layangan di sore hari 🪁\nKalau ada salah, jangan disimpan di hati 😆💚",
      "Pergi ke masjid pakai peci 🕌\nMaafin aku ya walau aku ngeselin dikit sih 😜",
      "Beli baju warna hijau 👕\nKalau aku salah, maafin ya walau gak tau malu 😭",
      "Makan rendang pakai sambal 🌶️\nMaaf ya kalau aku kadang nyebelin dan gagal total 😅",
      "Ke rumah nenek bawa dodol 🍬\nMaafin aku ya walau suka bikin kesel level maksimal 😆"
    ];

    const randomIndex = Math.floor(Math.random() * ucapanList.length);
    document.getElementById("ucapan").innerText = ucapanList[randomIndex];
  </script>
</body>
</html>
