<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selamat Idulfitri 😆</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #d4fc79, #96e6a1);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .card {
      border-radius: 20px;
    }
    .qris-img {
      max-width: 200px;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card shadow p-4">
      <h1 class="mb-3">🌙 Selamat Idulfitri 🌙</h1>
      <h5 id="ucapan" class="mb-4 text-success"></h5>

      <p class="mb-2">Kalau maaf diterima...</p>
      <h4 class="text-danger">THR juga boleh ya 😜</h4>

      <img src="qris.png" alt="QRIS THR" class="qris-img my-3">

      <p class="text-muted">Scan QRIS di atas biar makin berkah 💸</p>
    </div>
  </div>

  <script>
    const ucapanList = [
      "Minal aidin wal faizin, mohon maaf lahir batin ya bestie ✨",
      "Jika salah kata terucap, mohon di-skip aja ya 😭🙏",
      "Maafin aku ya, soalnya kamu gak bisa di-uninstall 🥺",
      "Lebaran tanpa maaf tuh kayak chat tanpa balasan 😔",
      "Mohon maaf lahir batin, semoga THR mengalir deras 💰",
      "Kalau aku banyak salah, anggap aja itu plot twist 😎",
      "Maaf ya kalau aku annoying, tapi kan gemes 😆",
      "Selamat lebaran! Jangan lupa maafin biar dosa auto clear 😇"
    ];

    const randomIndex = Math.floor(Math.random() * ucapanList.length);
    document.getElementById("ucapan").innerText = ucapanList[randomIndex];
  </script>
</body>
</html>
